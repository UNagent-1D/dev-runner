# Cloudflare Worker — UNAgent gateway.
#
# This is the BOOTSTRAP TEMPLATE. The bootstrap script (scripts/bootstrap.sh)
# substitutes the {{PLACEHOLDERS}} below with values from your .env files +
# the Railway service hostnames it captures, then writes the result to
# `wrangler.toml` (gitignored).
#
# If you ever need to edit `wrangler.toml` by hand, mirror the change into
# THIS file so re-running the bootstrap doesn't blow it away.

name = "unagent-gateway"
main = "src/index.ts"
compatibility_date = "2026-01-15"
workers_dev = false

# Static SPA assets — Vite build output is mounted into the Worker so the
# same wrangler deploy uploads code AND assets in one shot.
[assets]
directory = "../FrontEnd/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# ---------------------------------------------------------------------------
# dev — bound to dev.<apex>. Worker proxies to Railway dev backends.
# ---------------------------------------------------------------------------
[env.dev]
name = "unagent-gateway-dev"
routes = [{ pattern = "dev.unagent.site", custom_domain = true }]

[env.dev.vars]
BACKEND_ORCH       = "https://chat-orch-dev.up.railway.app"
BACKEND_TENANT     = "https://tenant-dev-07ad.up.railway.app"
BACKEND_CHAT       = "https://conversation-chat-dev.up.railway.app"
BACKEND_COMPLIANCE = "https://compliance-dev-8757.up.railway.app"

# ---------------------------------------------------------------------------
# prod — bound to <apex>. Worker proxies to Railway prod backends.
# ---------------------------------------------------------------------------
[env.prod]
name = "unagent-gateway-prod"
routes = [{ pattern = "unagent.site", custom_domain = true }]

[env.prod.vars]
BACKEND_ORCH       = "https://chat-orch-production-29b4.up.railway.app"
BACKEND_TENANT     = "https://tenant-production-2017.up.railway.app"
BACKEND_CHAT       = "https://conversation-chat-production-e5aa.up.railway.app"
BACKEND_COMPLIANCE = "https://compliance-production-7465.up.railway.app"
