name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  compose-validate:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (umbrella only)
        uses: actions/checkout@v4
        with:
          # Submodules are intentionally NOT fetched. docker compose config
          # validates YAML + env interpolation, which doesn't require the
          # build contexts to exist on disk. Avoids needing a PAT in this repo.
          submodules: false
          fetch-depth: 1

      - name: docker compose config --quiet
        env:
          # Placeholders so ${VAR} substitutions succeed during validation.
          # Compose only needs them to interpolate, not to actually connect.
          OPENROUTER_API_KEY: sk-or-placeholder
          JWT_SECRET: placeholder-secret
          DATABASE_URL: postgresql://postgres:placeholder@example.invalid:5432/postgres
          MONGO_URI: mongodb+srv://user:pass@cluster.example.invalid/?retryWrites=true
          MONGO_DB: conversatory
          SENDGRID_API_KEY: SG.placeholder
          EMAIL_FROM_DEFAULT: noreply@unagent.local
        run: docker compose config --quiet

  compliance-tests:
    name: Compliance tests (≥85% coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Compliance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Compliance/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest with coverage gate
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=85

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-coverage
          path: Compliance/.coverage
          if-no-files-found: ignore

  submodules-checkout:
    name: Submodules check out cleanly
    runs-on: ubuntu-latest
    # Skip on forks (the SUBMODULES_TOKEN secret won't be available).
    if: github.repository_owner != '' && !github.event.pull_request.head.repo.fork
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN }}
          fetch-depth: 1

      - name: Verify no submodule is missing
        run: |
          missing=$(git submodule status | grep -c '^-' || true)
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing submodule(s) failed to check out:"
            git submodule status | grep '^-'
            exit 1
          fi
          echo "All submodules checked out:"
          git submodule status

  dockerfile-lint:
    name: hadolint Dockerfiles
    runs-on: ubuntu-latest
    if: github.repository_owner != '' && !github.event.pull_request.head.repo.fork
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN }}
          fetch-depth: 1

      - name: Run hadolint on every Dockerfile
        # Lint each Dockerfile individually; some submodules' Dockerfiles are
        # heredoc-heavy and we don't want hadolint to bail the whole job on
        # one style nit. Report and continue.
        run: |
          set +e
          docker run --rm -i hadolint/hadolint:v2.12.0 --version
          fail=0
          while IFS= read -r df; do
            echo "──────────── $df ────────────"
            docker run --rm -i hadolint/hadolint:v2.12.0 hadolint --no-fail - < "$df" || fail=1
          done < <(find . -name 'Dockerfile' -not -path './node_modules/*' -not -path './*/node_modules/*')
          # `--no-fail` means we never `exit 1` from style nits; only catastrophic
          # parse errors flip `fail`. Bump to `--failure-threshold error` once
          # the submodule Dockerfiles are clean.
          exit $fail

  worker-typecheck:
    name: Cloudflare Worker typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-worker
    steps:
      - name: Checkout (umbrella only)
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cloudflare-worker/package-lock.json

      - name: Install + typecheck
        run: |
          npm ci
          npx wrangler types 2>/dev/null || true
          npx tsc --noEmit

  frontend-build:
    name: FrontEnd Vite build
    runs-on: ubuntu-latest
    if: github.repository_owner != '' && !github.event.pull_request.head.repo.fork
    defaults:
      run:
        working-directory: FrontEnd
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN }}
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: FrontEnd/pnpm-lock.yaml

      - name: Install + build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
