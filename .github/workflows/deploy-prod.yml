name: Deploy (prod)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read  # needed for the verify-dev-deploy lookup

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # The gate. Refuses to deploy if this exact SHA hasn't successfully run
  # through deploy-dev.yml. Combined with pr-gate.yml + branch protection,
  # this makes promotion to prod physically impossible without a green dev.
  # ---------------------------------------------------------------------------
  verify-dev-deploy:
    name: Verify dev deploy is green
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy-dev.yml conclusion for this SHA
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-dev.yml',
              head_sha: sha,
              per_page: 100,
            });
            const green = runs.data.workflow_runs.filter(
              r => r.conclusion === 'success'
            );
            if (green.length === 0) {
              core.setFailed(
                `No successful deploy-dev run for SHA ${sha}. ` +
                `This commit must be deployed to dev (and pass there) ` +
                `before it can ship to prod.`
              );
            } else {
              core.info(`✓ Found green deploy-dev run #${green[0].id} for ${sha}`);
            }

  deploy-backends:
    name: Railway / ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: verify-dev-deploy
    environment: prod
    strategy:
      fail-fast: false
      matrix:
        service:
          - chat-orch
          - tenant
          - conversation-chat
          - agent-runtime
          - hospital-mock
          - compliance
          - email-send
          - rabbitmq
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN }}
          fetch-depth: 1

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy ${{ matrix.service }} to prod
        run: railway up --service ${{ matrix.service }} --environment Production --detach

  deploy-worker:
    name: Cloudflare Worker
    runs-on: ubuntu-latest
    needs: verify-dev-deploy
    environment: prod
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN }}
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: FrontEnd/pnpm-lock.yaml

      - name: Build FrontEnd (Vite via pnpm)
        run: |
          cd FrontEnd
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Install Worker deps + deploy
        run: |
          cd cloudflare-worker
          npm ci
          npx wrangler deploy --env prod

  smoke:
    name: Smoke (prod)
    runs-on: ubuntu-latest
    needs: [deploy-backends, deploy-worker]
    steps:
      - name: Probe Worker (SPA root)
        run: |
          prod_apex="${{ vars.PROD_APEX }}"
          [ -z "$prod_apex" ] && { echo "Set the PROD_APEX repo variable to e.g. unagent.example.com"; exit 1; }
          curl --fail --retry 30 --retry-delay 10 --retry-all-errors -sS \
               -o /dev/null -w "%{http_code}\n" "https://$prod_apex/"

      - name: Probe Worker → Compliance (/stats/kpis through the proxy)
        run: |
          prod_apex="${{ vars.PROD_APEX }}"
          curl --fail --retry 20 --retry-delay 6 --retry-all-errors -sS \
               -o /dev/null -w "%{http_code}\n" "https://$prod_apex/stats/kpis"

      - name: Probe Railway public backends directly
        run: |
          # conversation-chat (Go/Gin) only answers /api/v1/health.
          for entry in \
            "${{ vars.RAILWAY_PROD_ORCH_URL }}|/health" \
            "${{ vars.RAILWAY_PROD_TENANT_URL }}|/health" \
            "${{ vars.RAILWAY_PROD_CHAT_URL }}|/api/v1/health" \
            "${{ vars.RAILWAY_PROD_COMPLIANCE_URL }}|/health"; do
            base="${entry%%|*}"; path="${entry##*|}"
            [ -z "$base" ] && continue
            url="${base}${path}"
            echo "→ $url"
            curl --fail --retry 30 --retry-delay 10 --retry-all-errors -sS \
                 -o /dev/null -w "  %{http_code}\n" "$url"
          done
