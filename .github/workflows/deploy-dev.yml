name: Deploy (dev)

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Railway — 8 backends in parallel. Each `railway up --detach` uploads the
  # umbrella workspace (with submodules) and triggers a build on Railway.
  # ---------------------------------------------------------------------------
  deploy-backends:
    name: Railway / ${{ matrix.service }}
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        service:
          - chat-orch
          - tenant
          - conversation-chat
          - agent-runtime
          - hospital-mock
          - compliance
          - email-send
          - rabbitmq
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_DEV }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN }}
          fetch-depth: 1

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy ${{ matrix.service }} to dev
        run: railway up --service ${{ matrix.service }} --environment dev --detach

  # ---------------------------------------------------------------------------
  # Cloudflare Worker — single deploy. Builds the Vite SPA, then uploads
  # both the bundle and the static assets via wrangler.
  # ---------------------------------------------------------------------------
  deploy-worker:
    name: Cloudflare Worker
    runs-on: ubuntu-latest
    environment: dev
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN }}
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: FrontEnd/pnpm-lock.yaml

      - name: Build FrontEnd (Vite via pnpm)
        run: |
          cd FrontEnd
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Install Worker deps + deploy
        run: |
          cd cloudflare-worker
          npm ci
          npx wrangler deploy --env dev

  # ---------------------------------------------------------------------------
  # Smoke tests — proves the deploy actually wired up. Health endpoints have
  # generous retries because Railway builds are async.
  # ---------------------------------------------------------------------------
  smoke:
    name: Smoke (dev)
    runs-on: ubuntu-latest
    needs: [deploy-backends, deploy-worker]
    steps:
      - name: Probe Worker (SPA root)
        run: |
          # The dev.<apex> hostname comes from the wrangler.toml the bootstrap
          # rendered. We rely on it being reachable here; if you re-run the
          # bootstrap with a different apex, update this URL.
          dev_apex="${{ vars.DEV_APEX }}"
          [ -z "$dev_apex" ] && { echo "Set the DEV_APEX repo variable to e.g. dev.unagent.example.com"; exit 1; }
          curl --fail --retry 30 --retry-delay 10 --retry-all-errors -sS \
               -o /dev/null -w "%{http_code}\n" "https://$dev_apex/"

      - name: Probe Worker → Compliance (/stats/kpis through the proxy)
        run: |
          dev_apex="${{ vars.DEV_APEX }}"
          curl --fail --retry 20 --retry-delay 6 --retry-all-errors -sS \
               -o /dev/null -w "%{http_code}\n" "https://$dev_apex/stats/kpis"

      - name: Probe Railway public backends directly
        run: |
          # Each backend exposes a different health path. conversation-chat
          # (Go/Gin) only answers under /api/v1/health; the others expose /health.
          for entry in \
            "${{ vars.RAILWAY_DEV_ORCH_URL }}|/health" \
            "${{ vars.RAILWAY_DEV_TENANT_URL }}|/health" \
            "${{ vars.RAILWAY_DEV_CHAT_URL }}|/api/v1/health" \
            "${{ vars.RAILWAY_DEV_COMPLIANCE_URL }}|/health"; do
            base="${entry%%|*}"; path="${entry##*|}"
            [ -z "$base" ] && continue
            url="${base}${path}"
            echo "→ $url"
            curl --fail --retry 30 --retry-delay 10 --retry-all-errors -sS \
                 -o /dev/null -w "  %{http_code}\n" "$url"
          done
