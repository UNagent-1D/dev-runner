services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: archsoft-redis
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - archsoft

  # Local Postgres backing Hospital-MP. Schema + seed are applied on first
  # boot via /docker-entrypoint-initdb.d (Postgres convention). Subsequent
  # restarts reuse the volume; drop the volume to re-seed.
  hospital-postgres:
    image: postgres:16-alpine
    container_name: archsoft-hospital-postgres
    environment:
      POSTGRES_DB: ${HOSPITAL_DB_NAME:-hospital}
      POSTGRES_USER: ${HOSPITAL_DB_USER:-hospital}
      POSTGRES_PASSWORD: ${HOSPITAL_DB_PASSWORD:-hospital}
    expose:
      - "5432"
    volumes:
      - hospital-postgres-data:/var/lib/postgresql/data
      - ./Hospital-MP/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./Hospital-MP/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HOSPITAL_DB_USER:-hospital} -d ${HOSPITAL_DB_NAME:-hospital}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - archsoft

  # Local Mongo dedicated to the email audit service. conversation-chat
  # still talks to hosted Atlas via MONGO_URI; this one is intentionally
  # in-cluster so the audit trail stays self-contained for the demo.
  email-mongo:
    image: mongo:7
    container_name: archsoft-email-mongo
    expose:
      - "27017"
    volumes:
      - email-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - archsoft

  # Message broker — RabbitMQ with management UI.
  # Built from UN_message_broker_mb which pre-declares chat_requests +
  # chat_results queues via definitions.json.
  rabbitmq:
    build:
      context: ./UN_message_broker_mb
    container_name: archsoft-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - archsoft

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------
  tenant:
    build:
      context: ./Tenant
    container_name: archsoft-tenant
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      GIN_MODE: release
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - archsoft

  hospital-mock:
    build:
      context: ./Hospital-MP
    container_name: archsoft-hospital-mock
    environment:
      DATABASE_URL: postgresql://${HOSPITAL_DB_USER:-hospital}:${HOSPITAL_DB_PASSWORD:-hospital}@hospital-postgres:5432/${HOSPITAL_DB_NAME:-hospital}
    ports:
      - "8092:8080"
    depends_on:
      hospital-postgres:
        condition: service_healthy
    networks:
      - archsoft

  conversation-chat:
    build:
      context: ./conversation-chat
    container_name: archsoft-conversation-chat
    environment:
      SERVER_PORT: "8082"
      APP_VERSION: "1.0.0"
      GIN_MODE: release
      REDIS_URL: "redis://redis:6379/1"
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB:-conversatory}
      ACR_SERVICE_URL: "http://agent-runtime:3100"
      TENANT_SERVICE_URL: "http://agent-runtime:3100"
      AUTH_SERVICE_URL: "http://tenant:8080"
      OPENAI_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      AUTH_STUB: "true"
      AUTH_STUB_USER_ID: "00000000-0000-0000-0000-000000000001"
      AUTH_STUB_ROLE: "app_admin"
      AUTH_STUB_EMAIL: "internal@platform.local"
      DEFAULT_IDLE_TIMEOUT_SECONDS: "300"
      RABBITMQ_URL: "amqp://rabbitmq:5672"
    ports:
      - "8082:8082"
    depends_on:
      redis:
        condition: service_healthy
      agent-runtime:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - archsoft

  agent-runtime:
    build:
      context: ./agent-runtime
    container_name: archsoft-agent-runtime
    environment:
      PORT: "3100"
      CONVERSATION_CHAT_URL: "http://conversation-chat:8082"
      HOSPITAL_MOCK_URL: "http://hospital-mock:8080"
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      OPENAI_DEFAULT_MODEL: ${OPENAI_DEFAULT_MODEL:-nvidia/nemotron-3-super-120b-a12b:free}
      RABBITMQ_URL: "amqp://rabbitmq:5672"
    ports:
      - "3100:3100"
    depends_on:
      hospital-mock:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - archsoft

  chat-orch:
    build:
      context: ./chat-orch
    container_name: archsoft-chat-orch
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "3000"
      CONVERSATION_CHAT_URL: "http://conversation-chat:8082"
      TENANT_SERVICE_URL: "http://tenant:8080"
      METRICAS_URL: "http://compliance:8091"
      HOSPITAL_MOCK_URL: "http://hospital-mock:8080"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_DEFAULT_TENANT_ID: ${TELEGRAM_DEFAULT_TENANT_ID:-demo-tenant}
      CORS_ALLOW_ORIGIN: "http://localhost:3000"
      OPENAI_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      OPENAI_DEFAULT_MODEL: ${OPENAI_DEFAULT_MODEL:-nvidia/nemotron-3-super-120b-a12b:free}
      AGENT_RUNTIME_URL: "http://agent-runtime:3100"
      RUST_LOG: "chat_orch=info,tower_http=info"
      LOG_FORMAT: "json"
    ports:
      - "8000:3000"
    depends_on:
      - agent-runtime
      - conversation-chat
      - hospital-mock
    networks:
      - archsoft

  frontend:
    build:
      context: ./FrontEnd
      args:
        # Vite inlines these at build time. Override in .env to point the
        # bundle at non-localhost hosts (staging, prod, LAN demos).
        VITE_TENANT_API_URL: ${VITE_TENANT_API_URL:-http://localhost:8080}
        VITE_ORCH_API_URL: ${VITE_ORCH_API_URL:-http://localhost:8000}
        VITE_METRICAS_API_URL: ${VITE_METRICAS_API_URL:-http://localhost:8091}
        VITE_CHAT_API_URL: ${VITE_CHAT_API_URL:-http://localhost:8082/api/v1}
    container_name: archsoft-frontend
    ports:
      - "3000:80"
    depends_on:
      tenant:
        condition: service_healthy
      conversation-chat:
        condition: service_started
    networks:
      - archsoft

  # ---------------------------------------------------------------------------
  # Compliance & Metrics API (Python/FastAPI) — back-compat for the old
  # Metricas wire contract (/conversation/chat, /feedback/csat, /stats/kpis,
  # /stats/timeseries) plus new audit endpoints (/v1/event, /v1/feedback).
  # Audit log is persisted to the local email-mongo container by default;
  # override MONGO_URI_COMPLIANCE in the umbrella .env to point elsewhere.
  # ---------------------------------------------------------------------------
  compliance:
    build:
      context: ./Compliance
    container_name: archsoft-compliance
    ports:
      - "8091:8091"
    environment:
      MONGO_URI: ${MONGO_URI_COMPLIANCE:-mongodb://email-mongo:27017}
      MONGO_DB_COMPLIANCE: ${MONGO_DB_COMPLIANCE:-UN_compliance_db}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8091/health', timeout=2).status == 200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      email-mongo:
        condition: service_healthy
    networks:
      - archsoft

  # ---------------------------------------------------------------------------
  # Email dispatch + audit trail (Java/Spring Boot, SendGrid + local Mongo).
  # ---------------------------------------------------------------------------
  email-send:
    build:
      context: ./UN_email_send_ms
    container_name: archsoft-email-send
    environment:
      SERVER_PORT: "8080"
      MONGO_URI: "mongodb://email-mongo:27017"
      MONGO_DB_EMAIL: ${MONGO_DB_EMAIL:-email_audit}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_SANDBOX_MODE: ${SENDGRID_SANDBOX_MODE:-true}
      EMAIL_FROM_DEFAULT: ${EMAIL_FROM_DEFAULT:-noreply@unagent.local}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-UNAgent Notifications}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_STUB: ${EMAIL_AUTH_STUB:-true}
      AUTH_STUB_USER_ID: "00000000-0000-0000-0000-000000000001"
      AUTH_STUB_ROLE: "app_admin"
      AUTH_STUB_EMAIL: "internal@platform.local"
      LOG_FORMAT: "json"
    ports:
      - "8089:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    depends_on:
      email-mongo:
        condition: service_healthy
    networks:
      - archsoft

networks:
  archsoft:
    driver: bridge

volumes:
  email-mongo-data:
  hospital-postgres-data:
